<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fleet Dashboard — OpenClaw</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #22263a;
    --border: #2a2e3f;
    --text: #e1e4ed;
    --text-muted: #8b90a0;
    --accent: #6c5ce7;
    --accent-glow: #6c5ce740;
    --green: #00d2d3;
    --green-dim: #00d2d340;
    --red: #ff6b6b;
    --red-dim: #ff6b6b40;
    --yellow: #feca57;
    --yellow-dim: #feca5740;
    --blue: #54a0ff;
    --blue-dim: #54a0ff40;
    --orange: #ff9f43;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .nav-links { display: flex; gap: 12px; }
  .nav-links a {
    color: var(--text-muted); text-decoration: none; font-size: 13px;
    padding: 4px 10px; border-radius: 6px; transition: all 0.2s;
  }
  .nav-links a:hover { color: var(--text); background: var(--surface-hover); }

  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .status-badge.running { background: var(--green-dim); color: var(--green); }
  .status-badge.stopped { background: var(--red-dim); color: var(--red); }

  .btn {
    padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #7c6cf7; }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
  .btn-danger:hover { background: var(--red); color: white; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); background: var(--surface-hover); }

  .stats-bar {
    display: flex; gap: 16px; padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }
  .stat {
    display: flex; flex-direction: column; gap: 2px;
    padding: 12px 20px; background: var(--surface); border-radius: 8px;
    border: 1px solid var(--border); min-width: 120px;
  }
  .stat-value { font-size: 24px; font-weight: 700; font-family: var(--mono); }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .main { padding: 24px; }

  .agents-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  .agent-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; transition: all 0.2s;
  }
  .agent-card:hover { border-color: var(--accent); }
  .agent-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .agent-name { font-size: 15px; font-weight: 600; }
  .agent-phase {
    font-size: 11px; padding: 3px 8px; border-radius: 10px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .phase-idle { background: var(--border); color: var(--text-muted); }
  .phase-planning { background: var(--blue-dim); color: var(--blue); }
  .phase-working { background: var(--green-dim); color: var(--green); }
  .phase-reporting, .phase-communicating { background: var(--accent-glow); color: var(--accent); }
  .phase-reflecting { background: var(--yellow-dim); color: var(--yellow); }
  .phase-paused { background: var(--orange); color: var(--bg); }
  .phase-error { background: var(--red-dim); color: var(--red); }

  .agent-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; }
  .agent-meta-item { display: flex; justify-content: space-between; color: var(--text-muted); }
  .agent-meta-item .val { color: var(--text); font-family: var(--mono); font-size: 11px; }

  .agent-task {
    margin-top: 10px; padding: 8px 10px; background: var(--bg);
    border-radius: 6px; font-size: 12px;
  }
  .agent-task .label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; margin-bottom: 2px; }
  .agent-task .title { color: var(--green); }

  .agent-actions { display: flex; gap: 6px; margin-top: 10px; }

  .cycle-log { margin-top: 24px; }
  .cycle-log h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .cycle-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
    background: var(--surface); border-radius: 8px; overflow: hidden;
  }
  .cycle-table th {
    text-align: left; padding: 8px 12px; background: var(--bg);
    color: var(--text-muted); font-weight: 500; text-transform: uppercase;
    font-size: 10px; letter-spacing: 0.5px;
  }
  .cycle-table td { padding: 6px 12px; border-top: 1px solid var(--border); }
  .cycle-table tr:hover td { background: var(--surface-hover); }

  .decision-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    font-weight: 600; font-family: var(--mono);
  }
  .decision-pick_task { background: var(--green-dim); color: var(--green); }
  .decision-continue_work { background: var(--blue-dim); color: var(--blue); }
  .decision-complete_task { background: var(--accent-glow); color: var(--accent); }
  .decision-idle { background: var(--border); color: var(--text-muted); }
  .decision-reflect { background: var(--yellow-dim); color: var(--yellow); }
  .decision-respond_message, .decision-report_progress { background: var(--orange); color: var(--bg); }

  .ws-badge {
    position: fixed; bottom: 12px; right: 12px;
    padding: 4px 10px; border-radius: 10px; font-size: 11px;
    background: var(--surface); border: 1px solid var(--border); z-index: 100;
  }
  .ws-badge.connected { border-color: var(--green); color: var(--green); }
  .ws-badge.disconnected { border-color: var(--red); color: var(--red); }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-muted);
  }
  .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 13px; max-width: 400px; margin: 0 auto; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <h1><span>Fleet</span> Dashboard</h1>
  <div class="header-actions">
    <div class="nav-links">
      <a href="/kanban">Kanban</a>
      <a href="/comms">Comms</a>
    </div>
    <div id="fleet-badge" class="status-badge stopped">stopped</div>
    <button id="btn-start" class="btn btn-primary" onclick="startFleet()">Start Fleet</button>
    <button id="btn-stop" class="btn btn-danger" onclick="stopFleet()" style="display:none">Stop Fleet</button>
    <button class="btn btn-ghost" onclick="refresh()">Refresh</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><span class="stat-value" id="stat-agents">0</span><span class="stat-label">Agents</span></div>
  <div class="stat"><span class="stat-value" id="stat-cycles">0</span><span class="stat-label">Cycles</span></div>
  <div class="stat"><span class="stat-value" id="stat-tasks">0</span><span class="stat-label">Tasks Done</span></div>
  <div class="stat"><span class="stat-value" id="stat-errors">0</span><span class="stat-label">Errors</span></div>
</div>

<div class="main">
  <div id="agents-grid" class="agents-grid"></div>
  <div id="empty-state" class="empty-state" style="display:none">
    <h3>No agents running</h3>
    <p>Enable autonomy in your config and start the fleet, or spawn individual agents.</p>
  </div>

  <div class="cycle-log">
    <h2>Recent Cycles</h2>
    <table class="cycle-table">
      <thead><tr><th>Agent</th><th>Phase</th><th>Decision</th><th>Tasks</th><th>Messages</th><th>Duration</th></tr></thead>
      <tbody id="cycle-tbody"></tbody>
    </table>
  </div>
</div>

<div id="ws-badge" class="ws-badge disconnected">disconnected</div>

<script>
let ws = null;
let reqId = 1;
const pending = new Map();

function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen = () => {
    document.getElementById("ws-badge").className = "ws-badge connected";
    document.getElementById("ws-badge").textContent = "connected";
    const authToken = "__GATEWAY_AUTH_TOKEN__";
    const connectParams = {
      minProtocol: 3, maxProtocol: 3,
      client: { id: "openclaw-control-ui", version: "dev", platform: "browser", mode: "ui" },
      role: "operator", scopes: ["operator.admin"]
    };
    if (authToken) connectParams.auth = { token: authToken };
    rpc("connect", connectParams).then(() => refresh()).catch(() => refresh());
  };
  ws.onclose = () => {
    document.getElementById("ws-badge").className = "ws-badge disconnected";
    document.getElementById("ws-badge").textContent = "disconnected";
    setTimeout(connect, 3000);
  };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.id && pending.has(msg.id)) {
        const { resolve } = pending.get(msg.id);
        pending.delete(msg.id);
        resolve(msg.result ?? msg.error);
      }
    } catch {}
  };
}

function rpc(method, params = {}) {
  return new Promise((resolve, reject) => {
    if (!ws || ws.readyState !== 1) { reject(new Error("not connected")); return; }
    const id = reqId++;
    pending.set(id, { resolve, reject });
    ws.send(JSON.stringify({ type: "req", id, method, params }));
    setTimeout(() => { if (pending.has(id)) { pending.delete(id); reject(new Error("timeout")); } }, 15000);
  });
}

async function refresh() {
  try {
    const status = await rpc("autonomy.status");
    renderStatus(status);
    const cycles = await rpc("autonomy.cycles", { limit: 30 });
    renderCycles(Array.isArray(cycles) ? cycles : []);
  } catch (e) {
    renderEmpty(e.message || "Autonomy not available");
  }
}

function renderStatus(s) {
  const badge = document.getElementById("fleet-badge");
  const startBtn = document.getElementById("btn-start");
  const stopBtn = document.getElementById("btn-stop");

  if (s?.error) {
    badge.className = "status-badge stopped";
    badge.textContent = "disabled";
    startBtn.style.display = "none";
    stopBtn.style.display = "none";
    renderEmpty(s.error);
    return;
  }

  badge.className = s.running ? "status-badge running" : "status-badge stopped";
  badge.textContent = s.running ? "running" : "stopped";
  startBtn.style.display = s.running ? "none" : "";
  stopBtn.style.display = s.running ? "" : "none";

  document.getElementById("stat-agents").textContent = s.agentCount;
  document.getElementById("stat-cycles").textContent = s.totalCyclesCompleted;
  document.getElementById("stat-tasks").textContent = s.totalTasksCompleted;
  document.getElementById("stat-errors").textContent = s.totalErrors;

  const grid = document.getElementById("agents-grid");
  const empty = document.getElementById("empty-state");

  if (!s.agents || s.agents.length === 0) {
    grid.innerHTML = "";
    empty.style.display = "";
    return;
  }
  empty.style.display = "none";
  grid.innerHTML = s.agents.map(renderAgentCard).join("");
}

function renderAgentCard(a) {
  const phaseClass = `phase-${a.phase}`;
  const taskHtml = a.currentTaskId
    ? `<div class="agent-task"><div class="label">Current Task</div><div class="title">${esc(a.currentTaskId)}</div></div>`
    : "";
  return `
    <div class="agent-card">
      <div class="agent-card-header">
        <span class="agent-name">${esc(a.agentId)}</span>
        <span class="agent-phase ${phaseClass}">${a.phase}</span>
      </div>
      <div class="agent-meta">
        <div class="agent-meta-item"><span>Cycles</span><span class="val">${a.cyclesCompleted}</span></div>
        <div class="agent-meta-item"><span>Errors</span><span class="val">${a.errorCount}</span></div>
        <div class="agent-meta-item"><span>Running</span><span class="val">${a.running ? "yes" : "no"}</span></div>
      </div>
      ${taskHtml}
      <div class="agent-actions">
        <button class="btn btn-ghost" onclick="tickAgent('${esc(a.agentId)}')">Tick</button>
        <button class="btn btn-danger" onclick="removeAgent('${esc(a.agentId)}')">Remove</button>
      </div>
    </div>`;
}

function renderCycles(cycles) {
  const tbody = document.getElementById("cycle-tbody");
  if (!cycles.length) { tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;color:var(--text-muted)'>No cycles yet</td></tr>"; return; }
  tbody.innerHTML = cycles.reverse().map(c => {
    const decType = c.decision?.type ?? "unknown";
    return `<tr>
      <td>${esc(c.agentId)}</td>
      <td><span class="agent-phase phase-${c.phase}">${c.phase}</span></td>
      <td><span class="decision-badge decision-${decType}">${decType}</span></td>
      <td>${c.tasksCompleted}</td>
      <td>${c.messagesPosted}</td>
      <td style="font-family:var(--mono);font-size:11px">${c.durationMs}ms</td>
    </tr>`;
  }).join("");
}

function renderEmpty(msg) {
  const grid = document.getElementById("agents-grid");
  const empty = document.getElementById("empty-state");
  grid.innerHTML = "";
  empty.style.display = "";
  empty.querySelector("p").textContent = msg || "Enable autonomy in your config.";
}

async function startFleet() { await rpc("autonomy.start"); refresh(); }
async function stopFleet() { await rpc("autonomy.stop"); refresh(); }
async function tickAgent(id) { await rpc("autonomy.agent.tick", { agentId: id }); refresh(); }
async function removeAgent(id) { await rpc("autonomy.agent.remove", { agentId: id }); refresh(); }

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

connect();
setInterval(refresh, 5000);
</script>
</body>
</html>
